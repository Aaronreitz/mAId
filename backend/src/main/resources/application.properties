# Server
quarkus.http.port=8080

# CORS — allow frontend (file:// or dev server) to call the backend
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,OPTIONS

# Claude (Anthropic)
quarkus.rest-client.claude-api.url=https://api.anthropic.com
claude.api.key=${CLAUDE_API_KEY:}

# OpenAI
quarkus.rest-client.openai-api.url=https://api.openai.com
openai.api.key=${OPENAI_API_KEY:}

# Ollama (local)
quarkus.rest-client.ollama-api.url=${OLLAMA_BASE_URL:http://localhost:11434}
